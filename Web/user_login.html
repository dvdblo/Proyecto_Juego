            <h2 class="backText">Sumérgete en un innexplorado mundo y ayuda a Astro a recuperar la comunicación con la Tierra.</h2>

            <section class="backText" id="login">
                <h2>Iniciar Sesión</h2>
                <ul>
                    <input type="text" id="username" class = "displays" placeholder="Usuario">
                    <input type="password" id="password" class = "displays" placeholder="Contraseña">

                    <li><button class = "displays" onclick="login(document.getElementById('username').value, 
                            document.getElementById('password').value)">Iniciar Sesion</button></li>
                    <li><button class = "displays" onclick="register(document.getElementById('username').value,
