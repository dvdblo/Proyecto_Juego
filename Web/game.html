<body onload="validateGame()">
    <div class="fondo"></div>
<!----------------------------------------------------------------------------------------------------------->
<!----------------------------------------------------------------------------------------------------------->
    <div id="game-container" style="display: none;"></div>

            <script src="../Videojuego/js/config/gameConfig.js"></script>
            <script src="../Videojuego/js/Librerias/Regions.js"></script>
            <script src="../Videojuego/js/Librerias/Vector.js"></script>
            <script src="../Videojuego/js/Librerias/GameObject.js"></script>
            <script src="../Videojuego/js/Librerias/AnimatedObject.js"></script>
            <script src="../Videojuego/js/Librerias/game_functions.js"></script>

            <script src="../Videojuego/js/scenes/menus.js"></script>

            <script src="../Videojuego/js/scenes/levels.js"></script>
            <script src="../Videojuego/js/scenes/states.js"></script>
            <script src="../Videojuego/js/main.js"></script>

            <script>
                let loginWindow = null;

                function validateGame() {
                    const id_user = JSON.parse(localStorage.getItem("id_jugador"));

                    if (!id_user) {
                        alert('Debes iniciar sesión primero');

                        if (!loginWindow || loginWindow.closed) {
                            loginWindow = window.open("user_login.html", "loginTab");
                        } else {
                            loginWindow.focus();
                        }

                        return;
                    }

                    gameConfig.id_jugador = id_user;
                    document.getElementById('game-container').style.display = 'block';
                }
            </script>
</body>
</html>
